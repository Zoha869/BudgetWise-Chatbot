<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetWise AI — your finance chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="page">

  <div class="header">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2V22" stroke="#1B2B23" stroke-width="2" stroke-linecap="round"/>
        <path d="M8 6H14.5C16.4 6 18 7.4 18 9C18 10.6 16.4 12 14.5 12H8" stroke="#1B2B23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 12H15.5C17.4 12 19 13.4 19 15C19 16.6 17.4 18 15.5 18H8" stroke="#1B2B23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div>
      <h1>BudgetWise AI</h1>
      <p>your plainspoken money advisor</p>
    </div>

    <div class="status"><span class="dot"></span>Online</div>
  </div>


  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <h2>Open an entry.</h2>
      <p>Ask about budgeting, saving, debt, or where to start.<br>Ledger keeps it plain — no jargon.</p>

      <div class="chips">
        <button class="chip" data-prompt="Suggest a simple starter budget for someone new to saving">
          Suggest a starter budget
        </button>

        <button class="chip" data-prompt="How much of my income should I actually save each month?">
          How much should I save?
        </button>

        <button class="chip" data-prompt="Explain compound interest like I'm hearing it for the first time">
          Explain compound interest
        </button>
      </div>

    </div>
  </div>


  <div class="inputbar">
    <textarea id="input" rows="1" placeholder="Ask BudgetWise something…" aria-label="Message"></textarea>

    <button class="seal" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="#1B2B23" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </button>
  </div>


  <div class="foot-note">
    General guidance only — not a substitute for a licensed financial advisor.
  </div>


</div>


<script src="/static/script.js"></script>

</body>
</html>
